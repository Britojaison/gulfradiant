<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; background: #f0f0f0; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .item { background: white; padding: 10px; text-align: center; }
  img { max-width: 100%; max-height: 80px; object-fit: contain; }
</style>
</head>
<body>
  <div class="grid">
    <script>
      const logos = [
        "image 3.png", "image 4.png", "image 6.png", "image 7.png", "image 9.png",
        "image 10.png", "image 11.png", "image 12.png", "image 13.png", "image 14.png",
        "image 15.png", "image 16.png", "image 17.png", "image 18.png", "image 19.png",
        "image 20.png", "image 21.png", "image 22.png", "image 23.png", "image 24.png",
        "image 25.png", "image 26.png", "image 27.png", "image 28.png", "image 29.png",
        "image 30.png", "image 31.png"
      ];
      doc = "";
      logos.forEach(logo => {
        doc += '<div class="item"><img src="public/Images/product/' + logo + '" /><br/>' + logo + '</div>';
      });
      document.querySelector('.grid').innerHTML = doc;
    </script>
  </div>
</body>
</html>
